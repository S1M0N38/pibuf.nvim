name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: "2.4.1"
          args: --check lua/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Neovim
        run: |
          curl -L https://github.com/neovim/neovim/releases/download/v0.12.2/nvim-linux-x86_64.tar.gz | tar xz -C "$HOME"
          echo "$HOME/nvim-linux-x86_64/bin" >> $GITHUB_PATH
          echo "VIMRUNTIME=$HOME/nvim-linux-x86_64/share/nvim/runtime" >> "$GITHUB_ENV"
      - name: Install lua-language-server
        run: |
          mkdir -p "$HOME/.local/share/lua-language-server"
          curl -L https://github.com/LuaLS/lua-language-server/releases/download/3.18.2/lua-language-server-3.18.2-linux-x64.tar.gz | tar xz -C "$HOME/.local/share/lua-language-server"
          echo "$HOME/.local/share/lua-language-server/bin" >> $GITHUB_PATH
      - name: Typecheck
        run: |
          lua-language-server --check_format=pretty --check lua/ --configpath="$GITHUB_WORKSPACE/.luarc.json" --checklevel=Warning

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nvim_version: ["stable", "nightly"]
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim_version }}
      - name: Install luarocks
        run: sudo apt-get update && sudo apt-get install -y luarocks
      - name: Run tests
        run: nvim -l tests/minit.lua --minitest
